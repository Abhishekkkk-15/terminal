kind = "web"
previewPath = "/"
title = "Warp-Inspired Terminal UI"
version = "1.0.0"
id = "artifacts/terminal-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26108

[services.development]
run = "pnpm --filter @workspace/terminal-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/terminal-ui", "run", "build" ]
publicDir = "artifacts/terminal-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26108"
BASE_PATH = "/"
